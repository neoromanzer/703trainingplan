let curBlock = 0, curWeek = 0;

function renderBlockNav() {
  document.getElementById('block-nav').innerHTML = ALL.map((b,i) =>
    `<button class="blk-btn ${b.btnCls||''} ${i===0?'active':''}" onclick="selectBlock(${i},this)">${b.label}</button>`
  ).join('');
}

function selectBlock(i, btn) {
  document.querySelectorAll('.blk-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curBlock = i; curWeek = 0;
  renderWeekNav(); renderWeek();
}

function selectWeek(i, btn) {
  document.querySelectorAll('.wk-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curWeek = i; renderWeek();
}

function renderWeekNav() {
  const b = ALL[curBlock];
  document.getElementById('block-desc-area').innerHTML = `<div class="block-desc">${b.desc}</div>`;
  document.getElementById('week-nav').innerHTML = b.weeks.map((w,i) =>
    `<button class="wk-btn ${w.wCls||''} ${i===0?'active':''}" onclick="selectWeek(${i},this)">${w.label}</button>`
  ).join('');
}

function renderWeek() {
  const w = ALL[curBlock].weeks[curWeek];
  document.getElementById('vol-row').innerHTML = w.vol.map(v =>
    `<div class="vol-pill"><span class="vol-dot" style="background:${v.c}"></span>${v.l}</div>`
  ).join('');
  document.getElementById('week-display').innerHTML = `<div class="days-grid">${w.days.map(d =>
    `<div class="day-card${d.cl?' '+d.cl:''}">
      <div class="day-name">${d.d}</div>
      <span class="tag ${T[d.t]}">${d.tl}</span>
      <div class="day-type">${d.ty}</div>
      <div class="day-detail">${d.de}</div>
    </div>`
  ).join('')}</div>`;
}

renderBlockNav(); renderWeekNav(); renderWeek();

// ---- helpers ----
const isBike = a => ['Ride','Virtual Ride'].includes(a.type);
const isRun  = a => ['Run','Virtual Run'].includes(a.type);
const isSwim = a => a.type === 'Swim';
const isTraining = a => isBike(a)||isRun(a)||isSwim(a);

// week key
function wk(dateStr) {
  const d = new Date(dateStr);
  const jan1 = new Date(d.getFullYear(),0,1);
  return d.getFullYear()+'-W'+String(Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)).padStart(2,'0');
}

// weekly buckets
const weeks = {};
ACTS.forEach(a => {
  const w = wk(a.date);
  if(!weeks[w]) weeks[w]={key:w,bike:0,run:0,swim:0,total:0,effort:0,cal:0};
  const m = a.min/60;
  if(isBike(a)) weeks[w].bike+=m;
  else if(isRun(a)) weeks[w].run+=m;
  else if(isSwim(a)) weeks[w].swim+=m;
  if(isTraining(a)) weeks[w].total+=m;
  weeks[w].effort+=(a.effort||0);
  weeks[w].cal+=(a.cal||0);
});
const wkArr = Object.values(weeks).sort((a,b)=>a.key>b.key?1:-1);
const wkLabels = wkArr.map(w=>w.key.replace(/\d{4}-/,''));

// fitness/fatigue (CTL/ATL/TSB approximation from effort/RPE)
// CTL = 42-day EMA of daily load, ATL = 7-day EMA
const dayLoad = {};
ACTS.forEach(a => { if(a.effort) dayLoad[a.date]=(dayLoad[a.date]||0)+a.effort; });
const allDates = [];
let d = new Date('2025-11-01');
const end = new Date('2026-03-17');
while(d<=end){ allDates.push(d.toISOString().slice(0,10)); d=new Date(d.getTime()+86400000); }

let ctl=0, atl=0;
const ctlArr=[], atlArr=[], tsbArr=[], dateLabels=[];
allDates.forEach(dt => {
  const load = dayLoad[dt]||0;
  ctl = ctl + (load-ctl)/42;
  atl = atl + (load-atl)/7;
  ctlArr.push(+ctl.toFixed(1));
  atlArr.push(+atl.toFixed(1));
  tsbArr.push(+(ctl-atl).toFixed(1));
  dateLabels.push(dt.slice(5));
});

// power over time (bike watts)
const bikeWatts = ACTS.filter(a=>isBike(a)&&a.watts).map(a=>({date:a.date,w:a.watts,hr:a.hr}));

// swim data
const swimData = ACTS.filter(isSwim).map(a=>({date:a.date,dist:Math.round(a.dist*1000),min:a.min,pace:a.dist>0?+(a.min/a.dist/10).toFixed(2):null}));

    type:'line',
    data:{ labels:dateLabels, datasets:[
      {label:'Fitness (CTL)',data:ctlArr,borderColor:C.bike,backgroundColor:'rgba(74,125,212,0.08)',borderWidth:2,pointRadius:0,tension:0.3,fill:true},
      {label:'Fatigue (ATL)',data:atlArr,borderColor:C.run,backgroundColor:'rgba(226,75,74,0.06)',borderWidth:1.5,pointRadius:0,tension:0.3,fill:true},
      {label:'Form (TSB)',data:tsbArr,borderColor:C.swim,backgroundColor:'rgba(26,158,117,0.08)',borderWidth:1.5,pointRadius:0,tension:0.3,fill:false},
    ]},
    options:{...baseOpts(),
      plugins:{ legend:{display:true,position:'top',labels:{color:C.text,font:{size:11},boxWidth:10,boxHeight:10,padding:12}},
      tooltip:{mode:'index',intersect:false,backgroundColor:'#fff',titleColor:'#333',bodyColor:'#666',borderColor:'#e0deda',borderWidth:1} } }
  });
}

// ---- POWER & HR ----
function dashPower() {
  const wattSessions = ACTS.filter(a=>isBike(a)&&a.watts);
  const avgW = wattSessions.reduce((s,a)=>s+a.watts,0)/wattSessions.length;
  const maxW = Math.max(...wattSessions.map(a=>a.watts));
  const hrSessions = ACTS.filter(a=>isTraining(a)&&a.hr);
  const avgHR = hrSessions.reduce((s,a)=>s+a.hr,0)/hrSessions.length;
  const maxHR = Math.max(...ACTS.filter(a=>a.maxhr).map(a=>a.maxhr));

  document.getElementById('dash-content').innerHTML = `
  <style>${dashStyle}</style>
  <div class="metric-row">
    <div class="metric"><div class="ml">Avg bike power</div><div class="mv">${Math.round(avgW)}W</div><div class="ms">${wattSessions.length} sessions</div></div>
    <div class="metric"><div class="ml">Peak session power</div><div class="mv">${maxW}W</div><div class="ms">Feb 15 intervals</div></div>
    <div class="metric"><div class="ml">Avg heart rate</div><div class="mv">${Math.round(avgHR)} bpm</div><div class="ms">all training sessions</div></div>
    <div class="metric"><div class="ml">Max HR recorded</div><div class="mv">${maxHR} bpm</div><div class="ms">Jan 14 Zwift</div></div>
  </div>
  <div class="two">
    <div>
      <div class="sec">Avg power per session (W)</div>
      <div class="ch" style="height:200px;"><canvas id="wattChart"></canvas></div>
    </div>
    <div>
      <div class="sec">Avg HR per session (bpm)</div>
      <div class="ch" style="height:200px;"><canvas id="hrChart"></canvas></div>
    </div>
  </div>
  <div class="sec">HR distribution across sessions</div>
  <div class="ch" style="height:180px;"><canvas id="hrDistChart"></canvas></div>
  <div class="note">
    <strong>Power trend:</strong> Your Zwift avg power ranged 70–141W Jan–Feb. No FTP test done yet — the 20 min test in W4 will establish your baseline. Estimated FTP ~105–115W based on sustained efforts.<br>
    <strong>HR:</strong> Most training sessions in 120–145 bpm range. Max recorded 176 bpm (Jan 14). Resting HR data not available from Strava export.
  </div>`;

  destroyChart('wattChart');
  charts.wattChart = new Chart(document.getElementById('wattChart'),{
    type:'bar',
    data:{ labels:wattSessions.map(a=>a.date.slice(5)), datasets:[{data:wattSessions.map(a=>a.watts),backgroundColor:C.bike,borderRadius:3}] },
    options:{...baseOpts('W'), scales:{...baseOpts('W').scales, x:{...baseOpts('W').scales.x,ticks:{...baseOpts('W').scales.x.ticks,maxTicksLimit:12}}}}
  });

  const hrS = hrSessions.sort((a,b)=>a.date>b.date?1:-1);
  destroyChart('hrChart');
  charts.hrChart = new Chart(document.getElementById('hrChart'),{
    type:'line',
    data:{ labels:hrS.map(a=>a.date.slice(5)), datasets:[
      {data:hrS.map(a=>a.hr),borderColor:C.run,backgroundColor:'rgba(226,75,74,0.08)',borderWidth:1.5,pointRadius:2,tension:0.3,fill:true,label:'Avg HR'},
      {data:hrS.map(a=>a.maxhr),borderColor:'rgba(226,75,74,0.3)',borderWidth:1,pointRadius:0,tension:0.3,fill:false,label:'Max HR'},
    ]},
    options:{...baseOpts('bpm'), plugins:{legend:{display:true,position:'top',labels:{color:C.text,font:{size:10},boxWidth:8,boxHeight:8,padding:8}},tooltip:{mode:'index',intersect:false,backgroundColor:'#fff',titleColor:'#333',bodyColor:'#666',borderColor:'#e0deda',borderWidth:1}}}
  });

  // HR zone distribution
  const zones = [0,0,0,0,0];
  hrSessions.forEach(a => {
    const h = a.hr;
    if(h<115) zones[0]++;
    else if(h<130) zones[1]++;
    else if(h<145) zones[2]++;
    else if(h<160) zones[3]++;
    else zones[4]++;
  });
  destroyChart('hrDistChart');
  charts.hrDistChart = new Chart(document.getElementById('hrDistChart'),{
    type:'bar',
    data:{ labels:['Z1 <115','Z2 115–129','Z3 130–144','Z4 145–159','Z5 160+'],
           datasets:[{data:zones,backgroundColor:[C.swim,'#4A7DD4','#EF9F27','#D85A30',C.run],borderRadius:4}] },
    options:{...baseOpts('sessions'), indexAxis:'y',
      scales:{ x:{...baseOpts().scales.x,ticks:{color:C.text,font:{size:10}}}, y:{grid:{display:false},ticks:{color:C.text,font:{size:10}}} }}
  });
}

// ---- WEEKLY VOLUME ----
function dashVolume() {
  const totArr = wkArr.map(w=>+w.total.toFixed(1));
  const maxTot = Math.max(...totArr);

  document.getElementById('dash-content').innerHTML = `
  <style>${dashStyle}</style>
  <div class="metric-row">
    <div class="metric"><div class="ml">Peak week (hrs)</div><div class="mv">${maxTot.toFixed(1)}h</div><div class="ms">W52 Dec 2025</div></div>
    <div class="metric"><div class="ml">Avg active week (hrs)</div><div class="mv">${(totArr.filter(v=>v>0).reduce((s,v)=>s+v,0)/totArr.filter(v=>v>0).length).toFixed(1)}h</div><div class="ms">excl. zero weeks</div></div>
    <div class="metric"><div class="ml">Block 1 target</div><div class="mv">~5h</div><div class="ms">per active week</div></div>
    <div class="metric"><div class="ml">Peak block target</div><div class="mv">~11h</div><div class="ms">Block 6 weeks</div></div>
  </div>
  <div class="sec">Weekly training hours by discipline</div>
  <div class="ch" style="height:240px;"><canvas id="volChart"></canvas></div>
  <div class="sec">Weekly relative effort (load)</div>
  <div class="ch" style="height:160px;"><canvas id="effortChart"></canvas></div>
  <div class="note">
    <strong>Training load gap:</strong> Jan had your highest Zwift volume. Feb dropped off. March is restarting. Block 1 target is ~5h/week by W3 — you're on track with today's sessions included.
  </div>`;

  destroyChart('volChart');
  charts.volChart = new Chart(document.getElementById('volChart'),{
    type:'bar',
    data:{ labels:wkLabels, datasets:[
      {label:'Bike',data:wkArr.map(w=>+w.bike.toFixed(1)),backgroundColor:C.bike,stack:'s',borderRadius:2},
      {label:'Run', data:wkArr.map(w=>+w.run.toFixed(1)), backgroundColor:C.run, stack:'s',borderRadius:2},
      {label:'Swim',data:wkArr.map(w=>+w.swim.toFixed(1)),backgroundColor:C.swim,stack:'s',borderRadius:2},
    ]},
    options:{...baseOpts('hours'),
      scales:{
        x:{stacked:true,grid:{color:C.grid},ticks:{color:C.text,font:{size:10},maxRotation:45}},
        y:{stacked:true,grid:{color:C.grid},ticks:{color:C.text,font:{size:10},callback:v=>v+'h'}}
      },
      plugins:{ legend:{display:true,position:'top',labels:{color:C.text,font:{size:11},boxWidth:10,boxHeight:10,padding:12}},
      tooltip:{mode:'index',intersect:false,backgroundColor:'#fff',titleColor:'#333',bodyColor:'#666',borderColor:'#e0deda',borderWidth:1} }
    }
  });

  destroyChart('effortChart');
  charts.effortChart = new Chart(document.getElementById('effortChart'),{
    type:'bar',
    data:{ labels:wkLabels, datasets:[{data:wkArr.map(w=>Math.round(w.effort)),backgroundColor:'rgba(74,125,212,0.5)',borderRadius:3,label:'Load'}] },
    options:{...baseOpts('effort'),
      plugins:{ legend:{display:false}, tooltip:{backgroundColor:'#fff',titleColor:'#333',bodyColor:'#666',borderColor:'#e0deda',borderWidth:1} }
    }
  });
}

// ---- SWIM ----
function dashSwim() {
  const avgPace = swimData.filter(s=>s.pace&&s.pace<4).reduce((s,a)=>s+a.pace,0)/swimData.filter(s=>s.pace&&s.pace<4).length;
  const bestPace = Math.min(...swimData.filter(s=>s.pace&&s.pace<4).map(s=>s.pace));
  const maxDist = Math.max(...swimData.map(s=>s.dist));

  document.getElementById('dash-content').innerHTML = `
  <style>${dashStyle}</style>
  <div class="metric-row">
    <div class="metric"><div class="ml">Sessions</div><div class="mv">${swimData.length}</div><div class="ms">Dec 2025 – Mar 2026</div></div>
    <div class="metric"><div class="ml">Best pace</div><div class="mv">${bestPace.toFixed(2)}</div><div class="ms">min/100m</div></div>
    <div class="metric"><div class="ml">Avg pace</div><div class="mv">${avgPace.toFixed(2)}</div><div class="ms">min/100m (clean sessions)</div></div>
    <div class="metric"><div class="ml">Longest session</div><div class="mv">${maxDist}m</div><div class="ms">Race distance: 1,900m</div></div>
  </div>
  <div class="two">
    <div>
      <div class="sec">Distance per session (m)</div>
      <div class="ch" style="height:200px;"><canvas id="swimDistChart"></canvas></div>
    </div>
    <div>
      <div class="sec">Pace per session (min/100m)</div>
      <div class="ch" style="height:200px;"><canvas id="swimPaceChart"></canvas></div>
    </div>
  </div>
  <div class="note">
    <strong>Pace note:</strong> Feb 23–28 sessions show slower pace (4.5–5.1 min/100m) — likely open turns or broken sets rather than a regression. Your clean pace is consistently 2.0–2.3 min/100m which is solid for fitness swimming.<br>
    <strong>Race target:</strong> 1,900m at 2.1 min/100m = ~40 min swim split. Achievable from current base with the volume build in the plan.
  </div>`;

  const cleanSwims = swimData.filter(s=>s.dist>300);
  destroyChart('swimDistChart');
  charts.swimDistChart = new Chart(document.getElementById('swimDistChart'),{
    type:'bar',
    data:{ labels:cleanSwims.map(s=>s.date.slice(5)), datasets:[{data:cleanSwims.map(s=>s.dist),backgroundColor:C.swim,borderRadius:3}] },
    options:{...baseOpts('m')}
  });

  const paceSwims = swimData.filter(s=>s.pace&&s.pace<6&&s.dist>300);
  destroyChart('swimPaceChart');
  charts.swimPaceChart = new Chart(document.getElementById('swimPaceChart'),{
    type:'line',
    data:{ labels:paceSwims.map(s=>s.date.slice(5)), datasets:[{data:paceSwims.map(s=>s.pace),borderColor:C.swim,backgroundColor:'rgba(26,158,117,0.1)',borderWidth:2,pointRadius:4,tension:0.2,fill:true}] },
    options:{...baseOpts('min/100m'), scales:{...baseOpts().scales, y:{...baseOpts().scales.y, reverse:true, ticks:{color:C.text,font:{size:10},callback:v=>v.toFixed(1)}}}}
  });
}

// ---- ROUTER ----
function showDash(tab, btn) {
  document.querySelectorAll('#dash-nav .blk-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  Object.values(charts).forEach(c=>c.destroy());
  charts = {};
  if(tab==='overview') dashOverview();
  else if(tab==='fitness') dashFitness();
  else if(tab==='power') dashPower();
  else if(tab==='volume') dashVolume();
  else if(tab==='swim') dashSwim();
}

dashOverview();
</script>
